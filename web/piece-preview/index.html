<!DOCTYPE html>

<style>
body{margin:0;background:#1a1a2e;display:flex;flex-direction:column;align-items:center;padding:20px;font-family:Arial,sans-serif;color:#f0d9b5}
h1{color:#d4af37;margin-bottom:4px;font-size:22px}
p{font-size:12px;opacity:.6;margin-bottom:16px}
.board{display:grid;grid-template-columns:repeat(8,60px);border:3px solid #8b6914;box-shadow:0 8px 32px rgba(0,0,0,.8)}
.sq{width:60px;height:60px;display:flex;align-items:center;justify-content:center}
.sq svg{width:54px;height:54px;filter:drop-shadow(0 3px 7px rgba(0,0,0,.7))}
.light{background:#f0d9b5}.dark{background:#b58863}
.label{display:flex;gap:40px;margin-top:18px}
.col{text-align:center}
.col h3{font-size:13px;color:#d4af37;margin-bottom:8px}
.pieces{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;background:rgba(255,255,255,.05);padding:10px;border-radius:8px}
.piece-wrap{display:flex;flex-direction:column;align-items:center;gap:2px}
.piece-wrap span{font-size:9px;opacity:.5}
</style>
</head>
