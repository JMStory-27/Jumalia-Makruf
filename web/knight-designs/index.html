designs.forEach((d, idx) => {

  card.innerHTML = `
    <span class="num">#${idx+1}</span>
    <svg class="preview" width="96" height="96" viewBox="0 0 45 45">
      <rect width="45" height="45" fill="#f0d9b5" rx="5"/>

    </svg>

    <span class="desc">${d.desc}</span>
  `;
  card.onclick = () => {
    document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
    selectedIdx = idx;
    document.getElementById('selected-info').textContent = `✅ Dipilih: #${idx+1} — ${d.name} (${d.desc})`;
  };
  grid.appendChild(card);
});
