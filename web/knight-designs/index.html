const grid=document.getElementById('grid');
D.forEach((d,i)=>{
  const card=document.createElement('div');
  card.className='card';
  card.innerHTML=`<span class="num">#${i+1}</span>
    <svg width="96" height="96" viewBox="0 0 45 45">
      <rect width="45" height="45" fill="#f0d9b5" rx="5"/>
      <rect fill="#222" stroke="#222" stroke-width="1.5" rx="2" x="9" y="38" width="27" height="4"/>
      ${d.p}
    </svg>
    <label>${d.n}</label><span class="desc">${d.d}</span>`;
  card.onclick=()=>{
    document.querySelectorAll('.card').forEach(c=>c.classList.remove('selected'));
    card.classList.add('selected');
    document.getElementById('sel').textContent=`✅ Pilihan: #${i+1} — ${d.n}`;
  };
  grid.appendChild(card);
});
</script>
