  card.innerHTML = `<span class="num">#${i+1}</span>

      ${d.extra || ''}

    <label>${d.n}</label><span class="desc">${d.d}</span>`;
  card.onclick = () => {
    document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');

  };

});
