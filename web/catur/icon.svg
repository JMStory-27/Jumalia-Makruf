<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d1f"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f5d020"/>
      <stop offset="100%" stop-color="#c9a227"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="3" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="88" fill="url(#bg)"/>

  <!-- Subtle chess board squares (top area) -->
  <g opacity="0.07">
    <rect x="0" y="0" width="64" height="64" fill="white" rx="0"/>
    <rect x="128" y="0" width="64" height="64" fill="white"/>
    <rect x="256" y="0" width="64" height="64" fill="white"/>
    <rect x="384" y="0" width="64" height="64" fill="white"/>
    <rect x="64" y="64" width="64" height="64" fill="white"/>
    <rect x="192" y="64" width="64" height="64" fill="white"/>
    <rect x="320" y="64" width="64" height="64" fill="white"/>
    <rect x="448" y="64" width="64" height="64" fill="white"/>
    <rect x="0" y="64" width="64" height="64" fill="white" opacity="0"/>
  </g>

  <!-- Gold border ring -->
  <rect x="10" y="10" width="492" height="492" rx="80" fill="none" stroke="url(#gold)" stroke-width="5" opacity="0.5"/>

  <!-- Chess Knight — scaled from 45x45 to fill icon (scale 8.9x, offset 56,28) -->
  <g transform="translate(56,28) scale(8.9)" filter="url(#shadow)">
    <!-- Base bar -->
    <rect fill="white" x="8" y="37" width="29" height="5" rx="2"/>
    <!-- Main knight body -->
    <path fill="white"
      d="M 27,37 C 31,35 35,30 35,23 C 35,16 31,10 27,8
         C 24,7 21,7 19,8 C 18,7 17,5 16,4 C 15,3 14,4 14,6
         C 13,7 13,10 14,12 C 12,14 10,17 9,21
         C 8,25 9,29 11,31 C 11,34 11,36 12,37 Z"/>
    <!-- Eye -->
    <circle fill="#1a1a2e" cx="27" cy="13" r="2.2"/>
    <!-- Nostril detail -->
    <path fill="none" stroke="#1a1a2e" stroke-width="1.4" stroke-linecap="round"
      d="M 10,21 C 9,19 11,18 12,20"/>
    <!-- Mane lines -->
    <path fill="none" stroke="#1a1a2e" stroke-width="1.2" stroke-linecap="round"
      d="M 19,8 C 18,6 19,4 21,5 M 21,6 C 22,4 24,5 23,7"/>
  </g>

  <!-- "Album Abadi" text -->
  <text x="256" y="452"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="58" font-weight="bold"
    fill="url(#gold)"
    filter="url(#glow)">Album Abadi</text>

  <!-- "CHESS" subtitle -->
  <text x="256" y="492"
    text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="26" letter-spacing="10" font-weight="600"
    fill="#f0d9b5" opacity="0.8">♟  CHESS</text>
</svg>
