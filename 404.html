<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<script>
(function(){
  var l=window.location;
  var repoBase='/Jumalia-Makruf/anime';
  var route=l.pathname.slice(repoBase.length)||'/';
  if(route==='/'&&!l.search)return;
  l.replace(l.origin+repoBase+'/?redirect='+encodeURIComponent(route+l.search+l.hash));
})();
</script>
</head><body></body></html>
