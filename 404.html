<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<script>
(function(){
  var l=window.location;
  var repoBase='/Jumalia-Makruf';
  var appPath='/lawnime';
  var fullBase=repoBase+appPath+'/';
  var route=l.pathname.slice((repoBase+appPath).length)||'/';
  if(route==='/'&&!l.search)return;
  l.replace(l.origin+fullBase+'?redirect='+encodeURIComponent(route+l.search+l.hash));
})();
</script>
</head><body></body></html>
