<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🎨 Preview Tema Title</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#d4af37;--bg:#06060f;--txt:#f0eaff;--txt2:#8a82aa;--rad:14px}
body{background:var(--bg);color:var(--txt);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}

/* ─── HEADER ─── */
.hdr{text-align:center;padding:28px 16px 16px;position:relative;z-index:10}
.hdr h1{font-size:clamp(20px,5vw,36px);font-weight:900;background:linear-gradient(135deg,#d4af37,#ec4899,#a855f7,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:1px}
.hdr p{color:var(--txt2);font-size:13px;margin-top:6px}

/* ─── VARIANT TABS ─── */
.tabs{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding:0 12px 16px;position:relative;z-index:10}
.tab{padding:8px 18px;border-radius:20px;border:1.5px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:var(--txt2);font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}
.tab.active{border-color:var(--gold);background:rgba(212,175,55,.15);color:var(--gold)}

/* ─── VARIANT SECTIONS ─── */
.variant{display:none;animation:fadeIn .3s ease}
.variant.show{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ─── TITLE GRID ─── */
.title-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;padding:0 12px 80px;max-width:1100px;margin:0 auto}

/* ─── TITLE CARD BASE ─── */
.tc{border-radius:18px;padding:16px 12px 14px;cursor:pointer;transition:transform .22s,box-shadow .22s;position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;gap:8px;border:1.5px solid transparent}
.tc:hover{transform:translateY(-4px) scale(1.03)}
.tc-num{position:absolute;top:8px;left:10px;font-size:10px;opacity:.5;font-weight:700}
.tc-icon{font-size:36px;line-height:1;position:relative;z-index:2}
.tc-name{font-size:11px;font-weight:800;text-align:center;line-height:1.2;position:relative;z-index:2}
.tc-label{font-size:10px;text-align:center;opacity:.65;position:relative;z-index:2}
.tc-bar{width:80%;height:3px;border-radius:2px;margin-top:2px;position:relative;z-index:2}
.tc-particles{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:1}
.particle{position:absolute;border-radius:50%;pointer-events:none}

/* ─── FULLSCREEN PREVIEW OVERLAY ─── */
.preview-ov{position:fixed;inset:0;z-index:500;display:none;flex-direction:column;align-items:center;justify-content:flex-start;padding:0;overflow-y:auto}
.preview-ov.show{display:flex}
.pov-close{position:fixed;top:14px;right:14px;width:38px;height:38px;border-radius:50%;background:rgba(0,0,0,.6);border:1.5px solid rgba(255,255,255,.2);color:#fff;font-size:18px;cursor:pointer;z-index:600;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
.pov-phone{width:100%;max-width:400px;min-height:100vh;padding:20px 16px 40px;display:flex;flex-direction:column;gap:12px;position:relative}

/* ─── MOCK PROFILE COMPONENTS ─── */
.mock-header{display:flex;align-items:center;gap:12px;padding:16px;border-radius:16px;border:1px solid rgba(255,255,255,.1)}
.mock-av{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;flex-shrink:0;border:3px solid;position:relative}
.mock-av-ring{position:absolute;inset:-4px;border-radius:50%;border:2px solid;animation:ringPulse 2s ease-in-out infinite}
@keyframes ringPulse{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(1.1);opacity:1}}
.mock-info{flex:1}
.mock-name{font-size:15px;font-weight:800;margin-bottom:3px}
.mock-title-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;margin-bottom:4px}
.mock-elo{font-size:11px;opacity:.6}
.mock-card{border-radius:14px;padding:14px;border:1px solid rgba(255,255,255,.08)}
.mock-card-title{font-size:11px;font-weight:700;opacity:.6;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.mock-stat-row{display:flex;justify-content:space-around}
.mock-stat{text-align:center}
.mock-stat-val{font-size:20px;font-weight:900}
.mock-stat-lbl{font-size:9px;opacity:.5;text-transform:uppercase}
.mock-xp-bar{height:8px;border-radius:4px;overflow:hidden;margin-top:8px;background:rgba(255,255,255,.08)}
.mock-xp-fill{height:100%;border-radius:4px;width:68%}
.mock-btn{padding:14px;border-radius:12px;border:none;font-size:13px;font-weight:700;cursor:pointer;text-align:center;margin-top:4px}

/* ─── PICK BAR ─── */
.pick-bar{position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(6,6,15,.95);border-top:1px solid rgba(255,255,255,.08);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;backdrop-filter:blur(12px)}
.pick-bar span{font-size:12px;color:var(--txt2);flex:1}
.pick-btn{padding:11px 24px;border-radius:12px;border:none;background:var(--gold);color:#000;font-weight:900;font-size:14px;cursor:pointer;white-space:nowrap}

/* ══════════════════════════════════════
   VARIANT A — ELEMENTAL REALM
══════════════════════════════════════ */
.va-1{background:linear-gradient(135deg,#0d0a06,#1a1208);border-color:#5a3e1b}
.va-2{background:linear-gradient(135deg,#0a0e06,#121808);border-color:#3a5a1a}
.va-3{background:linear-gradient(135deg,#0a0e08,#0f1a0a);border-color:#4a7a2a}
.va-4{background:linear-gradient(135deg,#0c100a,#142010);border-color:#5a8a3a}
.va-5{background:linear-gradient(135deg,#120c06,#201408);border-color:#8a4a1a;box-shadow:0 0 20px rgba(180,80,20,.2)}
.va-6{background:linear-gradient(135deg,#140a04,#261208);border-color:#c06020;box-shadow:0 0 25px rgba(200,100,30,.25)}
.va-7{background:linear-gradient(135deg,#180806,#2a100a);border-color:#e04020;animation:vaFirePulse 2s ease-in-out infinite}
.va-8{background:linear-gradient(135deg,#1a0604,#300808);border-color:#ff3010;animation:vaFirePulse 1.8s ease-in-out infinite}
@keyframes vaFirePulse{0%,100%{box-shadow:0 0 20px rgba(255,60,20,.3)}50%{box-shadow:0 0 40px rgba(255,80,20,.6)}}
.va-9{background:linear-gradient(135deg,#060a18,#0a1230);border-color:#2060e0;box-shadow:0 0 25px rgba(40,100,220,.3)}
.va-10{background:linear-gradient(135deg,#040818,#081228);border-color:#4080ff;box-shadow:0 0 30px rgba(60,120,255,.35);animation:vaStormPulse 2s ease-in-out infinite}
@keyframes vaStormPulse{0%,100%{box-shadow:0 0 25px rgba(60,120,255,.3)}50%{box-shadow:0 0 50px rgba(80,150,255,.6)}}
.va-11{background:linear-gradient(135deg,#080618,#100a2a);border-color:#8040ff;animation:vaStormPulse 1.8s ease-in-out infinite}
.va-12{background:linear-gradient(135deg,#080418,#0e0830);border-color:#a060ff;animation:vaLightning 1.5s ease-in-out infinite}
@keyframes vaLightning{0%,90%,100%{box-shadow:0 0 30px rgba(160,96,255,.4)}91%,93%{box-shadow:0 0 80px rgba(200,150,255,.9)}}
.va-13{background:linear-gradient(135deg,#08060a,#14080a);border-color:#c060a0;box-shadow:0 0 35px rgba(200,96,160,.4)}
.va-14{background:linear-gradient(135deg,#100408,#200610);border-color:#e080c0;animation:vaCosmicPulse 2s ease-in-out infinite}
@keyframes vaCosmicPulse{0%,100%{box-shadow:0 0 40px rgba(220,120,180,.45)}50%{box-shadow:0 0 70px rgba(240,140,200,.7)}}
.va-15{background:linear-gradient(135deg,#0a0408,#1a0610,#0a0408);border-color:#ffd700;animation:vaGoldPulse 1.5s ease-in-out infinite}
@keyframes vaGoldPulse{0%,100%{box-shadow:0 0 40px rgba(255,215,0,.5),0 0 0 1px rgba(255,215,0,.2)}50%{box-shadow:0 0 80px rgba(255,215,0,.8),0 0 0 2px rgba(255,215,0,.4)}}
.va-16{background:linear-gradient(135deg,#060208,#100418);border-color:#e0d0ff;animation:vaDiaPulse 1.2s ease-in-out infinite}
@keyframes vaDiaPulse{0%,100%{box-shadow:0 0 50px rgba(224,208,255,.5),0 0 0 2px rgba(200,180,255,.3)}50%{box-shadow:0 0 90px rgba(224,208,255,.8),0 0 0 3px rgba(220,200,255,.5)}}
.va-17{background:conic-gradient(from 0deg,#06060f,#1a0030,#0a1040,#06060f);border-color:#c0a0ff;animation:vaGalaxy 3s linear infinite}
@keyframes vaGalaxy{from{border-color:#c0a0ff}25%{border-color:#80d0ff}50%{border-color:#ffd0ff}75%{border-color:#80ffff}to{border-color:#c0a0ff}}
.va-18{background:radial-gradient(circle at 50% 50%,#2a0040,#06060f);border:2px solid transparent;background-clip:padding-box;animation:vaDivinePulse .8s ease-in-out infinite;position:relative}
.va-18::before{content:'';position:absolute;inset:-2px;border-radius:20px;background:conic-gradient(from 0deg,#ff0080,#ffd700,#00ff80,#0080ff,#ff0080);z-index:-1;animation:vaRainbow 2s linear infinite}
@keyframes vaRainbow{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes vaDivinePulse{0%,100%{box-shadow:0 0 60px rgba(255,100,255,.6),0 0 120px rgba(255,200,0,.4)}50%{box-shadow:0 0 100px rgba(255,150,255,.9),0 0 200px rgba(255,220,100,.6)}}

/* ══════════════════════════════════════
   VARIANT B — RPG TIER
══════════════════════════════════════ */
.vb-common{background:linear-gradient(160deg,#1a1a1a,#0f0f0f);border-color:#555}

.vb-rare{background:linear-gradient(160deg,#080a20,#040618);border-color:#3b82f6;box-shadow:0 0 20px rgba(59,130,246,.3);animation:vbRarePulse 2.5s ease-in-out infinite}
@keyframes vbRarePulse{0%,100%{box-shadow:0 0 20px rgba(59,130,246,.25)}50%{box-shadow:0 0 40px rgba(59,130,246,.5)}}
.vb-epic{background:linear-gradient(160deg,#100820,#060410);border-color:#a855f7;box-shadow:0 0 25px rgba(168,85,247,.35);animation:vbEpicPulse 2s ease-in-out infinite}
@keyframes vbEpicPulse{0%,100%{box-shadow:0 0 25px rgba(168,85,247,.35)}50%{box-shadow:0 0 55px rgba(168,85,247,.65)}}
.vb-legendary{background:linear-gradient(160deg,#201008,#0f0804);border-color:#f59e0b;box-shadow:0 0 30px rgba(245,158,11,.4);animation:vbLegPulse 1.8s ease-in-out infinite}
@keyframes vbLegPulse{0%,100%{box-shadow:0 0 30px rgba(245,158,11,.4)}50%{box-shadow:0 0 65px rgba(245,158,11,.75)}}
.vb-mythic{background:radial-gradient(circle at 50% 50%,#150020,#080010);border:2px solid transparent;animation:vbMythicBorder 2s linear infinite;position:relative}
.vb-mythic::before{content:'';position:absolute;inset:-2px;border-radius:20px;background:conic-gradient(#ff6ec7,#ffd700,#7cffcb,#ff6ec7);z-index:-1;animation:vaRainbow 3s linear infinite}

@keyframes vcPinkPulse{0%,100%{box-shadow:0 0 35px rgba(255,0,204,.5)}50%{box-shadow:0 0 75px rgba(255,50,220,.85)}}
.vc-12{background:#0c0408;border-color:#ff0066;animation:vcRedPulse 1.5s ease-in-out infinite}
@keyframes vcRedPulse{0%,100%{box-shadow:0 0 35px rgba(255,0,102,.5)}50%{box-shadow:0 0 80px rgba(255,0,120,.9)}}
.vc-13{background:#100202;border-color:#ff3300;animation:vcOranPulse 1.4s ease-in-out infinite}
@keyframes vcOranPulse{0%,100%{box-shadow:0 0 40px rgba(255,51,0,.55)}50%{box-shadow:0 0 85px rgba(255,80,0,.9)}}
.vc-14{background:#120800;border-color:#ff6600;animation:vcOranPulse 1.3s ease-in-out infinite}
.vc-15{background:#100800;border-color:#ffaa00;animation:vcGoldPulse 1.2s ease-in-out infinite}
@keyframes vcGoldPulse{0%,100%{box-shadow:0 0 45px rgba(255,170,0,.6)}50%{box-shadow:0 0 100px rgba(255,200,0,.95)}}
.vc-16{background:#080808;border-color:#ffffff;animation:vcWhitePulse 1s ease-in-out infinite}
@keyframes vcWhitePulse{0%,100%{box-shadow:0 0 30px rgba(255,255,255,.3)}50%{box-shadow:0 0 80px rgba(255,255,255,.7)}}
.vc-17{background:#000000;border:2px solid transparent;position:relative;animation:vcRainbowBorder 1.5s linear infinite}
.vc-17::before{content:'';position:absolute;inset:-2px;border-radius:20px;background:linear-gradient(90deg,#ff0080,#ffd700,#00ff80,#0080ff,#ff0080);background-size:400% 100%;z-index:-1;animation:vcRainbowShift 1.5s linear infinite}
@keyframes vcRainbowShift{from{background-position:0% center}to{background-position:400% center}}
.vc-18{background:radial-gradient(circle,#ffffff08,#000000);border:3px solid #fff;animation:vcUltimate .6s ease-in-out infinite alternate}
@keyframes vcUltimate{from{box-shadow:0 0 60px #fff,0 0 120px #ff0080,0 0 200px #ffd700}to{box-shadow:0 0 80px #fff,0 0 160px #0080ff,0 0 250px #00ff80}}

/* ══════════════════════════════════════

══════════════════════════════════════ */

@keyframes vdEmpPulse{0%,100%{box-shadow:0 0 40px rgba(255,128,255,.5),inset 0 0 30px rgba(200,0,200,.15)}50%{box-shadow:0 0 80px rgba(255,150,255,.8),inset 0 0 50px rgba(220,0,220,.25)}}
.vd-16{background:radial-gradient(circle at 50% 40%,#0a0818,#020408);border-color:#e0e8ff;animation:vdDiaPulse 1.2s ease-in-out infinite}

.vd-17{background:radial-gradient(circle,#100018,#03000a);border:2px solid transparent;position:relative}

/* ══════════════════════════════════════
   VARIANT E — COSMIC EVOLUTION
══════════════════════════════════════ */
.ve-1{background:radial-gradient(circle at 50% 80%,#1a1008,#06060e);border-color:#5a4020}
.ve-2{background:radial-gradient(circle at 50% 70%,#0a1418,#06060e);border-color:#204060}
.ve-3{background:radial-gradient(circle at 60% 60%,#0c1820,#06060e);border-color:#2060a0}
.ve-4{background:radial-gradient(circle at 60% 50%,#0a1830,#06060e);border-color:#2080c0;box-shadow:0 0 15px rgba(32,128,192,.2)}
.ve-5{background:radial-gradient(circle at 50% 40%,#0a1440,#06060e);border-color:#3060e0;box-shadow:0 0 20px rgba(48,96,224,.25);animation:veOrbitPulse 3s ease-in-out infinite}
@keyframes veOrbitPulse{0%,100%{box-shadow:0 0 20px rgba(48,96,224,.25)}50%{box-shadow:0 0 45px rgba(64,120,255,.5)}}
.ve-6{background:radial-gradient(circle at 50% 40%,#080e40,#06060e);border-color:#4080ff;animation:veOrbitPulse 2.5s ease-in-out infinite}

@keyframes veAstPulse{0%,100%{box-shadow:0 0 25px rgba(96,64,224,.35)}50%{box-shadow:0 0 55px rgba(120,80,255,.65)}}
.ve-8{background:radial-gradient(circle at 50% 30%,#180640,#06060e);border-color:#9040e0;animation:veAstPulse 2s ease-in-out infinite}

@keyframes veNebPulse{0%,100%{box-shadow:0 0 30px rgba(192,96,255,.35)}50%{box-shadow:0 0 65px rgba(210,110,255,.7)}}
.ve-10{background:radial-gradient(ellipse at 50% 50%,#300060,#06060e);border-color:#e080ff;animation:veNebPulse 1.8s ease-in-out infinite}
.ve-11{background:radial-gradient(ellipse at 50% 50%,#200840,#ff006008);border-color:#ff80c0;animation:veNebPulse2 1.8s ease-in-out infinite}
@keyframes veNebPulse2{0%,100%{box-shadow:0 0 35px rgba(255,128,192,.4)}50%{box-shadow:0 0 75px rgba(255,150,210,.75)}}

function buildGrid(v){
  const grid=document.getElementById('grid-'+v);
  grid.innerHTML='';
  TITLES.forEach((t,i)=>{
    const c=COLORS[v][i];
    const cls=VARCLS[v][i];
    const icon=VARICONS[v][i];
    const div=document.createElement('div');
    div.className='tc '+cls;
    div.innerHTML=`
      <span class="tc-num">#${String(i+1).padStart(2,'0')}</span>
      <span class="tc-icon">${icon}</span>
      <div class="tc-name" style="color:${c.txt}">${t.name}</div>
      <div class="tc-label" style="color:${c.accent}">Level ${(i*10)+1}–${(i+1)*10}</div>
      <div class="tc-bar" style="background:${c.bar.includes('gradient')?c.bar:'linear-gradient(90deg,'+c.accent+'88,'+c.accent+')'}"></div>
    `;
    div.onclick=()=>openPreview(v,i);
    grid.appendChild(div);
  });
}

    <button class="mock-btn" style="background:${c.accent}15;border:1.5px solid ${c.accent}44;color:${c.accent}">🎮 Mulai Bermain</button>

    <div style="text-align:center;margin-top:16px;padding:12px;border-radius:12px;background:${c.accent}08;border:1px solid ${c.accent}20">
      <div style="font-size:11px;color:${c.accent}88">Variasi yang sedang dilihat</div>
      <div style="font-size:15px;font-weight:800;color:${c.accent};margin-top:4px">${VARLABELS[v]}</div>
      <div style="font-size:11px;color:${c.txt}88;margin-top:4px;line-height:1.4">${VARDESCS[v]}</div>
    </div>

    <button onclick="selectVariant('${v}')" style="margin-top:16px;width:100%;padding:16px;border-radius:14px;border:none;background:${c.accent};color:${idx>=14?'#000':'#fff'};font-size:15px;font-weight:900;cursor:pointer;box-shadow:0 4px 20px ${c.accent}66">
      ✅ Pilih Variasi ${v.toUpperCase()} - ${VARLABELS[v]}
    </button>
  `;

  ov.classList.add('show');
  document.body.style.overflow='hidden';
}

function buildParticles(accent,idx){
  const count=Math.min(6+idx*2,30);
  let html='<div class="tc-particles" style="inset:0;position:fixed;pointer-events:none;z-index:0;overflow:hidden">';
  for(let i=0;i<count;i++){
    const x=Math.random()*100,y=Math.random()*100;
    const sz=2+Math.random()*4;
    const dur=3+Math.random()*6;
    const delay=Math.random()*5;
    html+=`<div class="particle" style="left:${x}%;top:${y}%;width:${sz}px;height:${sz}px;background:${accent};opacity:${0.3+Math.random()*0.5};box-shadow:0 0 ${sz*2}px ${accent};animation:partFloat ${dur}s ${delay}s ease-in-out infinite"></div>`;
  }
  html+='</div>';
  return html;
}

function closePreview(){
  document.getElementById('previewOv').classList.remove('show');
  document.body.style.overflow='';
}

let pickedVariant=null;
function selectVariant(v){
  pickedVariant=v;
  closePreview();
  const bar=document.getElementById('pickBar');
  bar.style.display='flex';
  document.getElementById('pickBarTxt').textContent='Kamu memilih: '+VARLABELS[v]+' 🎨';
  document.querySelectorAll('.tab').forEach(t=>{t.classList.remove('active');});
  document.querySelector(`[onclick="switchTab('${v}',this)"]`)?.classList.add('active');
}

function confirmPick(){
  if(!pickedVariant) return;
  const txt=`Pilihanku: Variasi ${pickedVariant.toUpperCase()} — ${VARLABELS[pickedVariant]}\n\nKirim ke aku untuk dipasang di game!`;
  navigator.clipboard.writeText(txt).then(()=>{
    const btn=document.querySelector('.pick-btn');const orig=btn.textContent;
    btn.textContent='✅ Disalin!';setTimeout(()=>btn.textContent=orig,2000);
  }).catch(()=>alert(txt));
}

function switchTab(v,btn){
  currentVariant=v;
  document.querySelectorAll('.variant').forEach(el=>el.classList.remove('show'));
  document.getElementById('v'+v).classList.add('show');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
}

// ESC to close
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePreview();});

// Add particle float animation
const s=document.createElement('style');
s.textContent=`@keyframes partFloat{0%,100%{transform:translateY(0) scale(1);opacity:.4}50%{transform:translateY(-20px) scale(1.5);opacity:.8}}`;
document.head.appendChild(s);

// Build all grids
['a','b','c','d','e'].forEach(buildGrid);
</script>
</body>
</html>
